{% extends 'myapp/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4>Reset Link Generated</h4>
                </div>
                <div class="card-body text-center">
                    <p>Password reset link has been generated.</p>
                    <p><strong>Check the Django terminal/console for the link.</strong></p>
                    <p>For demonstration, use this test link:</p>
                    <div class="alert alert-info">
                        <code>http://127.0.0.1:8000/reset/1/test-token/</code>
                    </div>
                    <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
